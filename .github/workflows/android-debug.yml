name: Build Android APK (debug)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export-android:
    name: Export Android debug APK
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable

      - name: Diagnostics
        run: |
          echo "HOME=$HOME"
          echo "--- ~/.config/godot ---"
          ls -la ~/.config/godot 2>&1 || echo "MISSING ~/.config/godot"
          echo "--- editor settings files ---"
          find ~/.config/godot -type f 2>&1
          echo "--- android/adb/java lines inside editor settings ---"
          grep -ri "android_sdk\|adb\|java_sdk" ~/.config/godot -r 2>&1 || echo "not found in editor settings"
          echo "--- searching for android sdk dirs ---"
          find / -maxdepth 6 -iname "*android-sdk*" 2>/dev/null
          echo "--- searching for adb binary ---"
          find / -iname "adb" -type f 2>/dev/null
          echo "--- searching for build-tools ---"
          find / -maxdepth 6 -iname "build-tools" 2>/dev/null
          echo "--- export templates present ---"
          find ~/.local/share/godot/export_templates -maxdepth 2 2>&1
          echo "--- java ---"
          which java 2>&1 || echo "no java in PATH"
          java -version 2>&1 || true

      - name: Import assets (build the .godot cache)
        run: godot --headless --verbose --editor --quit || true

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore /tmp/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999
          sed -i 's@keystore/debug=".*"@keystore/debug="/tmp/debug.keystore"@' export_presets.cfg
          echo "--- Verification ---"
          ls -l /tmp/debug.keystore
          grep "keystore/debug" export_presets.cfg

      - name: Export Android debug APK
        run: |
          mkdir -v -p build/android
          godot --headless --verbose --export-debug "Android" "$(pwd)/build/android/plateforme-mobile-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plateforme-mobile-debug-apk
          path: build/android/plateforme-mobile-debug.apk
