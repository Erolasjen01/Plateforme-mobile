name: Build Android APK (debug)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export-android:
    name: Export Android debug APK
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Godot
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/4.3.stable ~/.local/share/godot/export_templates/4.3.stable

      - name: Install Xvfb
        run: |
          apt-get update
          apt-get install -y xvfb

      - name: Import assets (build the .godot cache)
        run: xvfb-run --auto-servernum godot --verbose --editor --quit || true

      - name: Generate debug keystore
        run: |
          keytool -keyalg RSA -genkeypair -alias androiddebugkey -keypass android -keystore /tmp/debug.keystore -storepass android -dname "CN=Android Debug,O=Android,C=US" -validity 9999
          sed -i 's@keystore/debug=".*"@keystore/debug="/tmp/debug.keystore"@' export_presets.cfg

      - name: Export Android debug APK
        run: |
          mkdir -v -p build/android
          xvfb-run --auto-servernum godot --verbose --export-debug "Android" "$(pwd)/build/android/plateforme-mobile-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: plateforme-mobile-debug-apk
          path: build/android/plateforme-mobile-debug.apk
